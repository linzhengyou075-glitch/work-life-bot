services:
  - type: web
    name: work-life
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: WORK_LIFE_DB_PATH
        value: /tmp/worklife.db
      - key: SESSION_SECRET
        generateValue: true
