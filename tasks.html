<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="/static/style.css"><title>待辦事項</title></head><body class="wl-body"><header class="wl-header"><a href="/dashboard" class="wl-brand"><img src="/static/worklife_mascot.png"><b>Work Life</b><small>待辦事項</small></a><nav><a href="/dashboard">首頁</a><a href="/quick-schedule">快速班表</a><a href="/work-records">工作事項</a><a href="/logistics-settings">物流設定</a><a href="/notifications">提醒</a><a href="/profile">設定</a></nav></header><main class="wl-main"><div class="page-head"><div><h1>✅ 待辦事項</h1><p>記錄生活與工作中不能漏掉的事情。</p></div></div><div class="work-layout"><section class="wl-card"><h2>待辦清單</h2>{% for item in tasks %}<div class="reminder-item {{ 'done' if item.is_done else '' }}"><div><b>{{ item.title }}</b><small>{{ item.due_date or '未設定日期' }}</small><p>{{ item.note }}</p></div><div><form method="post" action="/tasks/{{ item.id }}/toggle"><button class="wl-btn ghost">{{ '恢復' if item.is_done else '完成' }}</button></form><form method="post" action="/tasks/{{ item.id }}/delete"><button class="wl-btn danger">刪除</button></form></div></div>{% else %}<p>目前沒有待辦事項。</p>{% endfor %}</section><aside><section class="wl-card"><h2>新增待辦</h2><form method="post" action="/tasks"><label>事項<input name="title" required></label><label>日期<input type="date" name="due_date"></label><label>備註<textarea name="note"></textarea></label><button class="wl-btn full">儲存待辦</button></form></section></aside></div></main></body></html>
